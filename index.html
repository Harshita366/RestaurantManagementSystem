<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to The Cozy Cornér</title>
    <link rel="stylesheet" href="cozy corner.css">
    <script src="cozy corner.js" defer></script>
</head>
<body>
    <header>
        <h1><u>The Cozy Cornér</u></h1>
        <nav>
            <ul>
                <li><a href="cozy corner.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="#order">Order Now</a></li>
            </ul>
        </nav>
    </header>
 <div id="home">
    <section>
        <h2 style="font-size: 30px;"><u>Welcome to The Cozy Cornér</u></h2><br>
        <img class="none" src="photo-1414235077428-338989a2e8c0.avif"><br>
        <p style="font-size: 20px; font-style: italic;">Your favorite spot for delicious food and cozy ambiance!</p>
    </section>

    <section id="order">
        <h2 style="font-size: 30px;"><u>Order Now</u></h2><br>
        <form id="orderForm">
            <label for="food">Select Food Item:</label>
            <select id="food" name="food">
                <option value="empty"></option>
                <option value="pizza">Pizza</option>
                <option value="burger">Burger</option>
                <option value="pasta">Pasta</option>
                <option value="cold coffee">Cold Coffee</option>
            </select><br><br>
            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" min="1" value="1"><br><br><br>
            <button type="submit" onClick="orderSummary()">Place Order</button>
        </form>
        <p id="orderSummary"></p>
    </section>
    <footer>
        <p>&copy; 2025 The Cozy Cornér!<br><br> Designed by Harshita.</p>
    </footer>
 </div>
</body>
</html>
